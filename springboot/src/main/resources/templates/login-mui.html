<!DOCTYPE html>
<html class="ui-page-login">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
<title>MUI LOGIN测试</title>
<link rel="stylesheet" th:href="@{css/mui.css}"/>
<link rel="stylesheet" th:href="@{css/login-mui.css}"/>
</head>
<body>
    <header class="mui-bar mui-bar-nav">
        <h1 class="mui-title">登录</h1>
    </header>
    <div class="mui-content">
        <form id='login-form' class="mui-input-group">
            <div class="mui-input-row">
                <label>账号</label>
                <input id='account' type="text" class="mui-input-clear mui-input" placeholder="请输入账号" />
            </div>
            <div class="mui-input-row">
                <label>密码</label>
                <input id='password' type="password" class="mui-input-clear mui-input" placeholder="请输入密码" />
            </div>
        </form>
        
        <!-- <form class="mui-input-group">
            <ul class="mui-table-view mui-table-view-chevron">
                <li class="mui-table-view-cell">
                    自动登录
                    <div id="autoLogin" class="mui-switch">
                        <div class="mui-switch-handle"></div>
                    </div>
                </li>
            </ul>
        </form> -->
        
        <div class="mui-content-padded">
            <button id='login' class="mui-btn mui-btn-block mui-btn-primary">登录</button>
            <!-- <div class="link-area"><a id='reg'>注册账号</a> <span class="spliter">|</span> <a id='forgetPassword'>忘记密码</a>
            </div> -->
        </div>
        
        <div class="mui-content-padded oauth-area">

        </div>
    </div>
    <script type="text/javascript" th:src="@{js/mui.js}"></script>
    <script type="text/javascript" th:src="@{js/login-mui.js}"></script>
    <script type="text/javascript">
        (function($, doc) {
        	var isIos = false,isAndroid = false;
        	$.init({
                statusBarBackground: '#f7f7f7'
            });
        	var toMain = function() {
                console.log('----11111111-----');
            };
            
        	$.ready(function(){
        		if ($.os.ios) {
        			isIos = true;
        		}else if($.os.android){
        			isAndroid = true;
        		}
                //检查 "登录状态/锁屏状态" 结束
                var loginButton = doc.getElementById('login');
                var accountBox  = doc.getElementById('account');
                var passwordBox = doc.getElementById('password');
                var clickEvt = 'click';
                if(isIos || isAndroid){
                	clickEvt = 'tap';
                }
                console.log('----clickEvt-----'+clickEvt);
                loginButton.addEventListener(clickEvt, function(event) {
                    var loginInfo = {
                        account: accountBox.value,
                        password: passwordBox.value
                    };
                    app.login(loginInfo, function(err) {
                        if (err) {
                            console.log(err);
                            mui.toast('输入错误');
                            return;
                        }
                        toMain();
                    });
                });
        		
                $.enterfocus('#login-form input', function() {
                    $.trigger(loginButton, 'tap');
                });
        	});
            
        }(mui,document));
    </script>
</body>
</html>
