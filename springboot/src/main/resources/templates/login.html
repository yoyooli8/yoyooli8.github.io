<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta content="text/html;charset=UTF-8"/>
<title>登录页面</title>
<link rel="stylesheet" th:href="@{css/bootstrap.min.css}"/>
<script type="text/javascript" src="webjars/jquery/3.1.1/jquery.js"></script>
<script type="text/javascript" th:src="@{webjars/cryptojs/3.1.2/rollups/aes.js}"></script>
<script type="text/javascript" th:src="@{webjars/cryptojs/3.1.2/components/mode-ecb-min.js}"></script>
<script type="text/javascript" th:src="@{webjars/cryptojs/3.1.2/components/pad-zeropadding-min.js}"></script>
<style type="text/css">
	body {
  padding-top: 50px;
}
.starter-template {
  padding: 40px 15px;
  text-align: center;
}
</style>
</head>
<body>
	
	 <nav class="navbar navbar-inverse navbar-fixed-top">
      <div class="container">
        <div class="navbar-header">
          <a class="navbar-brand" href="#">Spring Security演示</a>
        </div>
        <div id="navbar" class="collapse navbar-collapse">
          <ul class="nav navbar-nav">
           <li><a th:href="@{/}"> 首页 </a></li>
           
          </ul>
        </div><!--/.nav-collapse -->
      </div>
    </nav>
     <div class="container">

      <div class="starter-template">
       <p th:if="${param.logout}" class="bg-warning">已成功注销</p><!-- 1 -->
			<p th:if="${param.error}" class="bg-danger">有错误，请重试</p> <!-- 2 -->
			<h2>使用账号密码登录</h2>
			<form name="form" th:action="@{/login}" action="/login" method="POST" id="loginFm"> <!-- 3 -->
				<div class="form-group">
					<label for="username">账号</label>
					<input type="text" class="form-control" name="username" value="" placeholder="账号" />
				</div>
				<div class="form-group">
					<label for="password">密码</label>
					<input type="password" class="form-control" id="userPwd" placeholder="密码" />
					<input type="hidden" name="password" id="userHidePwd" />
				</div>
				<input type="button" id="login" value="Login" class="btn btn-primary" />
			</form>
      </div>

    </div>
	<script type="text/javascript">
	    $(function(){
	    	$('#login').on('click',function(){
	    		var loginForm = $('#loginFm');
	            var userPwd = $('#userPwd').val();
	            if(userPwd == ''){
	                alert('用户密码不能为空');
	                return false;
	            }
	            var iv  = CryptoJS.enc.Utf8.parse('5075428636499153');
	            var key = CryptoJS.enc.Utf8.parse('www.asiainfo.com');
	            //userPwd = sha256_digest(userPwd);
	            var encrypted = CryptoJS.AES.encrypt(userPwd, key,{
	            	iv:iv,
	            	mode: CryptoJS.mode.CBC,
	            	padding: CryptoJS.pad.ZeroPadding
	            });  
	            
	            var encodepwd  = encrypted.ciphertext.toString();
	            $('#userHidePwd').val(encodepwd);
	            
	            loginForm.submit();
	    	});
	    })
	    
	</script>	
</body>
</html>
